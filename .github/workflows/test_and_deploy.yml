name: Build, Test, and Deploy

on:
  workflow_call:
    secrets:
      CC_TEST_REPORTER_ID:
        required: true
  pull_request:
  merge_group:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # We need this for commit-lint

      - name: Set Node Version
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: lts/krypton

      - name: Install
        run: npm ci

      - name: Build and package library
        run: npm run package

      - name: Format
        run: npm run format:check

      - name: Build
        run: npm run build:prod

      - name: Archive build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist

      - name: Install chromium
        run: npx playwright install --with-deps chromium

      - name: Test
        run: npm run ci

      - name: Build Stackblitz
        working-directory: projects/stackblitz
        run: |
          npm ci
          npm run build -- --configuration=production

      - name: Archive coverage results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: success() || failure()
        with:
          name: coverage
          path: coverage/ngx-datatable-lib

      - name: Publish coverage results
        uses: qltysh/qlty-action/coverage@dafbc1e328f1f92525f1a3916724bd5fa01498e8 # v2
        env:
          QLTY_COVERAGE_TOKEN: ${{ secrets.QLTY_COVERAGE_TOKEN }}
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: ${{github.workspace}}/coverage/ngx-datatable-lib/lcov.info
        if: env.QLTY_COVERAGE_TOKEN

  e2e:
    runs-on: ubuntu-latest
    needs: build
    container: mcr.microsoft.com/playwright:v1.61.1-jammy@sha256:7b86926fff94374389e8e1f4fdc5c76d050d4a06a7886bb537bf412b20e2b71e
    steps:
      # We cannot use built-in LFS functionality due to the missing support of custom LFS endpoints.
      # See: https://github.com/actions/checkout/issues/365
      # As we are in another container, we even need to install LFS manually.
      - name: Install LFS
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          curl -s https://packagecloud.io/install/repositories/github/git-lfs/script.deb.sh | bash
          apt install git-lfs

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Pull Repository with LFS
        run: git lfs pull

      - name: Download build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist

      - name: Install
        run: npm ci

      - name: E2E
        run: npm run e2e

      - name: Upload E2E Results
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-results
          path: playwright/results
