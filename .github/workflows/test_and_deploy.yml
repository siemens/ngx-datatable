name: Build, Test, and Deploy

on:
  workflow_call:
    secrets:
      CC_TEST_REPORTER_ID:
        required: true
  pull_request:
  merge_group:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # We need this for commit-lint

      - name: Set Node Version
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: lts/krypton

      - name: Install
        run: npm ci

      - name: Build and package library
        run: npm run package

      - name: Format
        run: npm run format:check

      - name: Build
        run: npm run build:prod

      - name: Archive build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist

      - name: Install chromium
        run: npx playwright install --with-deps chromium

      - name: Test
        run: npm run ci

      - name: Build Stackblitz
        working-directory: projects/stackblitz
        run: |
          npm ci
          npm run build -- --configuration=production

      - name: Archive coverage results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: success() || failure()
        with:
          name: coverage
          path: coverage/ngx-datatable-lib

      - name: Publish coverage results
        uses: qltysh/qlty-action/coverage@a19242102d17e497f437d7466aa01b528537e899 # v2
        env:
          QLTY_COVERAGE_TOKEN: ${{ secrets.QLTY_COVERAGE_TOKEN }}
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: ${{github.workspace}}/coverage/ngx-datatable-lib/lcov.info
        if: env.QLTY_COVERAGE_TOKEN

  e2e:
    runs-on: ubuntu-latest
    needs: build
    container: mcr.microsoft.com/playwright:v1.59.1-jammy
    steps:
      # We cannot use built-in LFS functionality due to the missing support of custom LFS endpoints.
      # See: https://github.com/actions/checkout/issues/365
      # As we are in another container, we even need to install LFS manually.
      - name: Install LFS
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          curl -s https://packagecloud.io/install/repositories/github/git-lfs/script.deb.sh | bash
          apt install git-lfs

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Pull Repository with LFS
        run: git lfs pull

      - name: Download build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist

      - name: Install
        run: npm ci

      - name: E2E
        run: npm run e2e

      - name: Upload E2E Results
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-results
          path: playwright/results
